# Reference Kubernetes manifests for demo-java-spring-docker.
# Adjust image, resource limits, and namespace before applying.
#
#   kubectl apply -f k8s/deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-java-spring-docker
  labels:
    app: demo-java-spring-docker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-java-spring-docker
  template:
    metadata:
      labels:
        app: demo-java-spring-docker
      annotations:
        # Prometheus operator / Grafana Agent auto-discovery
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8081"
    spec:
      # terminationGracePeriodSeconds must be greater than:
      #   preStop sleep (5 s) + spring.lifecycle.timeout-per-shutdown-phase (30 s) + buffer
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001          # matches fixed UID baked into the image
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: demo-java-spring-docker:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management     # referenced by the probe specs below
              containerPort: 8081
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

          # startupProbe gates liveness/readiness until the JVM has fully started.
          # With JEP 483 AOT cache the app starts in ~500 ms, but 75 s ceiling is safe.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            failureThreshold: 15
            periodSeconds: 5

          # livenessProbe restarts the pod if the JVM deadlocks or becomes unresponsive.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # readinessProbe removes the pod from the Service Endpoints when not ready
          # (e.g. during startup or a temporary dependency outage).
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                # Give kube-proxy / the load-balancer ~5 s to remove this pod
                # from the Endpoints list before Spring starts draining connections.
                command: ["sh", "-c", "sleep 5"]

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            # Expose pod identity to structured loggers and tracing agents.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          volumeMounts:
            - name: tmp
              mountPath: /tmp     # writable scratch space; required with readOnlyRootFilesystem

      volumes:
        - name: tmp
          emptyDir: {}
