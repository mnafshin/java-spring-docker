spring.application.name=demo-java-spring-docker

# ── Graceful shutdown ──────────────────────────────────────────────────────────
# Drains in-flight requests before the JVM exits.
# Match this to terminationGracePeriodSeconds minus the preStop sleep.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Actuator / Management ──────────────────────────────────────────────────────
# Separate port keeps probe + metrics traffic off the application path and lets
# you lock down port 8081 at the network-policy layer.
management.server.port=8081
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
# "always" leaks internal details to unauthenticated callers – use when-authorized.
management.endpoint.health.show-details=when-authorized
