# Spring Boot Containers

## From Fat JARs to Benchmark-Driven Runtime Optimization

### Subtitle

Engineering Production-Grade JVM Containers with Measurable Performance

### Presenter

`Afshin Amini`

---

# Slide 1 — The Problem

## Most Spring Boot Containers Are Still Built Like This

```dockerfile
FROM eclipse-temurin:21
COPY target/app.jar app.jar
ENTRYPOINT ["java", "-jar", "app.jar"]
```

---

## Why This Is a Problem

| Problem | Consequence |
|---|---|
| Fat JAR invalidation | Slow CI/CD |
| Full JDK runtime | Huge image size |
| No runtime minimization | Wasted memory |
| Root execution | Security risk |
| No layering strategy | Poor caching |
| No benchmarking | Optimization guesswork |

---

# Slide 2 — Why This Matters

## Container Inefficiency Has Real Operational Cost

| Metric | Naive Runtime | Optimized Runtime |
|---|---:|---:|
| Image Size | 450MB | 90MB |
| Cold Startup | 3.2s | 450ms |
| RSS Memory | 600MB | 180MB |
| Deployment Pull Time | Slow | Fast |
| CI Rebuild Cost | High | Reduced |

---

## Impact Areas

* Kubernetes scaling latency
* Cloud infrastructure cost
* Registry storage growth
* CI/CD pipeline duration
* Cold-start-sensitive workloads
* Developer feedback loops

---

## Current Ecosystem

|---|---|---|

| Jib | Easy builds | Limited runtime analysis |

# Slide 6 — Layering Strategy

## Naive Layering

```text
Layer 1
└── fat.jar
```

### Result

* any code change invalidates the whole layer
* poor Docker cache reuse
* slower CI/CD

---

## Optimized Layering

```text
Layer 1 → dependencies
Layer 2 → snapshot dependencies
Layer 3 → Spring Boot loader
Layer 4 → application classes
```

### Result

* smaller rebuilds
* faster deployments
* improved registry efficiency

---

# Slide 7 — Runtime Minimization

## Standard Runtime

```text
Full JDK Runtime
≈ 350MB+
```

---

## jlink Runtime

```text
Custom Runtime
Only Required Modules
≈ 70MB–120MB
```

---

## Benefits

* reduced image size
* lower memory footprint
* faster startup
* reduced attack surface

---

# Slide 8 — The Hard Part of jlink

## Module Trimming Can Break Applications

### Common Failure Areas

* reflection
* JDBC drivers
* SSL providers
* Hibernate
* logging frameworks
* instrumentation libraries

---

## Solution

```toml
must_have_modules_file = "must-have.txt"
```

### Goal

Allow manual runtime stabilization when automatic analysis is insufficient.

---

# Slide 14 — Security Matters Too

## Container Optimization Is Also a Security Problem

### Production Concerns

* rootless execution
* distroless runtimes
* read-only filesystems
* SBOM generation
* image signing
* CVE scanning

---

## Goal

Smaller runtime ≠ only performance benefit.

Smaller runtime also means:

* smaller attack surface
* fewer dependencies
* reduced vulnerability exposure

# Slide 16 — Explainability

## Optimization Tooling Must Explain Itself

---

# Slide 17 — Tradeoffs Matter

## There Is No Universal Best Strategy

| Strategy | Advantage | Cost |
|---|---|---|
| Baseline JVM | Simplicity | Large runtime |
| Alpine | Smaller images | libc compatibility |
| jlink | Tiny runtime | Module complexity |
| Distroless | Security | Harder debugging |
| Native Image | Fast startup | Build complexity |
