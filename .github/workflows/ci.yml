name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        suite: [unit, integration, e2e, benchmark]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy

      - name: Test ${{ matrix.suite }}
        run: pytest tests/${{ matrix.suite }} --cov-fail-under=0

      - name: Benchmark regression gate
        if: matrix.os == 'ubuntu-latest'
        run: |
          springdocker benchmark analyze \
            --project-root samples/java-spring-docker \
            benchmarks/06-base-image-choice/results/raw.csv \
            --baseline benchmarks/06-base-image-choice/results/baseline.json \
            --fail-on-regression-above 20

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Core module coverage gate
        run: |
          pytest -q \
            --cov=springdocker.dockerfile \
            --cov=springdocker.commands \
            --cov=springdocker.config \
            --cov-fail-under=85

  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

      - name: Vulnerability scan (CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "0"
