name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate semantic tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must follow semantic versioning: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify package version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build artifacts
        run: python -m build

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign release artifacts (keyless)
        shell: bash
        run: |
          mkdir -p signatures
          for artifact in dist/*; do
            name="$(basename "$artifact")"
            cosign sign-blob --yes \
              --output-signature "signatures/${name}.sig" \
              --output-certificate "signatures/${name}.pem" \
              "${artifact}"
          done

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-signed-artifacts
          path: |
            dist/*
            signatures/*.sig
            signatures/*.pem

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
