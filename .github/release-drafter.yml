name-template: "v$NEXT_PATCH_VERSION"
tag-template: "v$NEXT_PATCH_VERSION"
change-template: "- $TITLE (#$NUMBER)"
template: |
  ## Changes

  $CHANGES

  ## Notes

  See `cli/README.md` for install and upgrade guidance.

categories:
  - title: "Features"
    labels: ["feature", "enhancement"]
  - title: "Fixes"
    labels: ["bug", "fix"]
  - title: "Maintenance"
    labels: ["chore", "maintenance", "docs", "test"]

version-resolver:
  default: patch
  major:
    labels: ["major"]
  minor:
    labels: ["minor"]
  patch:
    labels: ["patch", "fix", "feature", "enhancement", "chore", "maintenance", "docs", "test"]

